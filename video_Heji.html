<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heji Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: opacity 0.8s ease;
        }
        .spinner-container {
            position: relative;
            width: 80px; height: 80px;
            margin-bottom: 30px;
        }
        .spinner {
            width: 80px; height: 80px;
            border: 6px solid rgba(255,255,255,0.1);
            border-top: 6px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .loading-text {
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .heji-logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #ffcc00;
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.7);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .error-message {
            color: #ff6666;
            text-align: center;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Čia įklijuok savo tikrąjį iframe kodą iš Google Drive -->
        <iframe id="driveVideo" 
            src="https://drive.google.com/file/d/1xgCoB-PonqJYe3QQ2BEMEYbk6WvkumkJ/preview" 
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            allowfullscreen>
        </iframe>

        <!-- Loading ekranas -->
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner-container">
                <div class="spinner"></div>
            </div>
            <div class="loading-text">Kraunasi video...</div>
            <div class="heji-logo">HEJI</div>
        </div>

        <!-- Klaidos pranešimas (jei neveikia) -->
        <div class="error-message" id="errorMsg">
            <p>Video neįkeliamas.<br>
            Patikrink, ar failas tikrai nustatytas „Anyone with the link“ → Viewer.<br><br>
            Išbandyk atidaryti video tiesiogiai naršyklėje.</p>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('driveVideo');
        const loadingScreen = document.getElementById('loadingScreen');
        const errorMsg = document.getElementById('errorMsg');

        function hideLoading() {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 800);
        }

        // Kai iframe užsikrauna
        iframe.addEventListener('load', () => {
            setTimeout(() => {
                hideLoading();
            }, 1200);
        });

        // Jei po 10 sekundžių vis dar kraunasi – rodom klaidą
        setTimeout(() => {
            if (loadingScreen.style.display !== 'none') {
                hideLoading();
                errorMsg.style.display = 'block';
            }
        }, 10000);

        // Paspaudus bet kur – bandome "pažadinti" video
        document.addEventListener('click', () => {
            hideLoading();
        }, { once: true });
    </script>

</body>
</html>
