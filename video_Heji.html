<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heji Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }

        .loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid rgba(255, 204, 0, 0.2);
            border-top: 6px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        .loading-text {
            color: #fff;
            font-size: 21px;
            letter-spacing: 1px;
        }

        .heji-logo {
            margin-top: 25px;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 10px;
            color: #ffcc00;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.8);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <iframe id="driveVideo"
            src="https://drive.google.com/file/d/1YxEvJVJSvLWybgEbrjTt0kw6WMHp5IVo/preview?autoplay=1&loop=1&rel=0"
            allow="autoplay; fullscreen; encrypted-media"
            allowfullscreen>
    </iframe>

    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Kraunasi video...</div>
        <div class="heji-logo">HEJI</div>
    </div>

    <script>
        const iframe = document.getElementById('driveVideo');
        const loading = document.getElementById('loadingScreen');

        function hideLoading() {
            loading.classList.add('hidden');
            setTimeout(() => loading.style.display = 'none', 1000);
        }

        // Bandymas paslėpti loading
        iframe.addEventListener('load', () => {
            setTimeout(hideLoading, 2000);
        });

        // Jei vartotojas paspaudžia – slepiame loading ir bandome paleisti
        document.addEventListener('click', hideLoading, { once: true });

        // Atsarginis laikas
        setTimeout(hideLoading, 8000);
    </script>

</body>
</html>
