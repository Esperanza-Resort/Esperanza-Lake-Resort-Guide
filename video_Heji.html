<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heji Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: opacity 0.8s ease;
        }
        .spinner-container {
            position: relative;
            width: 80px; height: 80px;
            margin-bottom: 30px;
        }
        .spinner {
            width: 80px; height: 80px;
            border: 6px solid rgba(255,255,255,0.1);
            border-top: 6px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .loading-text {
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .heji-logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #ffcc00;
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.7);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container">
        <iframe id="driveVideo" 
            src="https://drive.google.com/file/d/1xgCoB-PonqJYe3QQ2BEMEYbk6WvkumkJ/preview?autoplay=1" 
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture; accelerometer; gyroscope; clipboard-write"
            allowfullscreen
            sandbox="allow-scripts allow-same-origin allow-popups">
        </iframe>

        <!-- Loading ekranas -->
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner-container">
                <div class="spinner"></div>
            </div>
            <div class="loading-text">Kraunasi video...</div>
            <div class="heji-logo">HEJI</div>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('driveVideo');
        const loadingScreen = document.getElementById('loadingScreen');

        function hideLoading() {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 800);
        }

        // Kai iframe užsikrauna – bandome paleisti video
        iframe.addEventListener('load', () => {
            hideLoading();

            // Papildomas bandymas autoplay per JS (po 1–2 sek.)
            setTimeout(() => {
                try {
                    // Bandome „pažadinti“ iframe turinį
                    iframe.contentWindow.postMessage('autoplay', '*');
                } catch(e) {}
                
                // Jei vis tiek nepasileido – paspaudimo simuliacija (veikia ne visada)
                iframe.focus();
            }, 1500);
        });

        // Paspaudus puslapį (jei naršyklė blokuoja autoplay)
        document.addEventListener('click', () => {
            hideLoading();
        }, { once: true });

        // Saugus timeout
        setTimeout(() => {
            hideLoading();
        }, 9000);
    </script>

</body>
</html>
